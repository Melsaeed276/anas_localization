name: Main CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - 'specs/**'
  workflow_dispatch:

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Package hygiene
        uses: ./.github/actions/package-hygiene

      - name: Package checks
        uses: ./.github/actions/flutter-package-checks
        with:
          run_tests: 'false'

      - name: Example analysis
        uses: ./.github/actions/flutter-package-checks
        with:
          working_directory: example
          run_format: 'false'
          run_tests: 'false'

      - name: Build API docs
        run: dart doc

      - name: Dependency outdated check (informational)
        continue-on-error: true
        run: dart pub outdated --mode=null-safety

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Run package tests
        uses: ./.github/actions/flutter-package-checks
        with:
          run_format: 'false'
          test_report_path: build/ci/test-report.json

      - name: Run example tests (if present)
        shell: bash
        run: |
          set -euo pipefail
          if find example/test -type f -name "*_test.dart" | grep -q .; then
            (cd example && flutter test --test-randomize-ordering-seed random)
          else
            echo "No example tests found; skipping."
          fi

      - name: Coverage report
        uses: ./.github/actions/coverage-report
        with:
          test_report_path: build/ci/test-report.json

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          install_example: 'false'

      - name: Build API docs for publish gate
        run: dart doc

      - name: Verify pub score
        uses: ./.github/actions/pana-score

      - name: Validate package publishing metadata
        run: flutter pub publish --dry-run
