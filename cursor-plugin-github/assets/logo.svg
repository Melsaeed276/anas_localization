<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="20" fill="#24292e"/>
  <!-- GitHub Octocat simplified mark -->
  <circle cx="50" cy="38" r="18" fill="#ffffff"/>
  <circle cx="50" cy="38" r="13" fill="#24292e"/>
  <!-- Eyes -->
  <circle cx="44" cy="35" r="3" fill="#ffffff"/>
  <circle cx="56" cy="35" r="3" fill="#ffffff"/>
  <!-- Body / tentacles -->
  <ellipse cx="50" cy="62" rx="16" ry="12" fill="#ffffff"/>
  <ellipse cx="50" cy="62" rx="11" ry="8" fill="#24292e"/>
  <!-- Left arm -->
  <ellipse cx="28" cy="58" rx="7" ry="4" fill="#ffffff" transform="rotate(-30 28 58)"/>
  <!-- Right arm -->
  <ellipse cx="72" cy="58" rx="7" ry="4" fill="#ffffff" transform="rotate(30 72 58)"/>
</svg>
