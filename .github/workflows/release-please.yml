name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Create/update release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
      should_publish: ${{ steps.check-publish.outputs.should_publish }}

    steps:
      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      - name: Checkout repository
        if: ${{ steps.release-please.outputs.pr != '' }}
        uses: actions/checkout@v7

      - name: Inject publish opt-in checkbox into release PR
        if: ${{ steps.release-please.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_PAYLOAD: ${{ steps.release-please.outputs.pr }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER="$(printf '%s' "${PR_PAYLOAD}" | jq -r '.number')"
          echo "Release PR number: ${PR_NUMBER}"

          MARKER="<!-- publish-opt-in -->"
          CHECKBOX="- [ ] Publish to pub.dev"

          BODY="$(gh pr view "${PR_NUMBER}" --json body --jq '.body')"

          # Strip any previous injected block, then re-add it.
          CLEANED="$(printf '%s\n' "${BODY}" | sed "/${MARKER}/,/<!-- \/publish-opt-in -->/d")"

          NEW_BODY="${CLEANED}

          ${MARKER}
          ${CHECKBOX}
          <!-- /publish-opt-in -->"

          gh pr edit "${PR_NUMBER}" --body "${NEW_BODY}"

      - name: Check publish opt-in from merged release PR
        id: check-publish
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          # Find the most recently merged release-please PR on main.
          PR_NUMBER="$(gh pr list \
            --state merged \
            --base main \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("release-please--"))] | .[0].number')"

          if [[ -z "${PR_NUMBER}" || "${PR_NUMBER}" == "null" ]]; then
            echo "No merged release-please PR found; skipping publish."
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          PR_BODY="$(gh pr view "${PR_NUMBER}" --json body --jq '.body')"
          if printf '%s\n' "${PR_BODY}" | grep -qE '\[x\] *Publish to pub\.dev'; then
            echo "Publish opt-in checkbox is checked in PR #${PR_NUMBER}. Will publish."
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Publish opt-in checkbox is NOT checked in PR #${PR_NUMBER}. Skipping publish."
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
          fi

  publish:
    name: Publish to pub.dev
    needs: release-please
    if: |
      needs.release-please.outputs.release_created == 'true' &&
      needs.release-please.outputs.should_publish == 'true'
    permissions:
      id-token: write
      contents: read
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
