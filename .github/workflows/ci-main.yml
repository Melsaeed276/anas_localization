name: Main CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install root dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Enforce formatting
        run: dart format --set-exit-if-changed .

      - name: Static analysis (package)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Static analysis (example)
        working-directory: example
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build API docs
        run: dart doc

      - name: Dependency outdated check (informational)
        continue-on-error: true
        run: dart pub outdated --mode=null-safety

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install root dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

      - name: Run example tests (if present)
        shell: bash
        run: |
          set -euo pipefail
          if find example/test -type f -name "*_test.dart" | grep -q .; then
            (cd example && flutter test)
          else
            echo "No example tests found; skipping."
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate package publishing metadata
        run: flutter pub publish --dry-run
