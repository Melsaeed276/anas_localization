name: Benchmark Harness

on:
  pull_request:
    branches:
      - '**'
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Run localization benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run benchmark harness
        run: flutter pub run benchmark/localization_benchmark.dart --output benchmark/latest_report.json

      - name: Compare against baseline (PR and scheduled)
        if: github.event_name == 'pull_request' || github.event_name == 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          BASELINE_OS="$(python3 -c "import json; print(json.load(open('benchmark/baseline.json'))['os'])")"
          if [[ "${BASELINE_OS}" != "linux" ]]; then
            echo "Skipping baseline comparison because benchmark/baseline.json targets ${BASELINE_OS}, not linux."
            exit 0
          fi
          flutter pub run benchmark/localization_benchmark.dart --compare benchmark/baseline.json --max-regression=0.25

      - name: Compare against baseline (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          BASELINE_OS="$(python3 -c "import json; print(json.load(open('benchmark/baseline.json'))['os'])")"
          if [[ "${BASELINE_OS}" != "linux" ]]; then
            echo "Skipping baseline comparison because benchmark/baseline.json targets ${BASELINE_OS}, not linux."
            exit 0
          fi
          flutter pub run benchmark/localization_benchmark.dart --compare benchmark/baseline.json --max-regression=0.25

      - name: Upload benchmark report artifact
        uses: actions/upload-artifact@v4
        with:
          name: localization-benchmark-report
          path: benchmark/latest_report.json
