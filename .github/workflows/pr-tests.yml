name: PR Quality Checks

on:
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - 'specs/**'

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          install_catalog: 'true'

      - name: Package hygiene
        uses: ./.github/actions/package-hygiene
        with:
          check_readme_links: ${{ matrix.os == 'ubuntu-latest' && 'true' || 'false' }}
          changelog_base_sha: ${{ github.event.pull_request.base.sha }}

      - name: Package checks
        uses: ./.github/actions/flutter-package-checks
        with:
          run_tests: 'false'

      - name: Example analysis
        uses: ./.github/actions/flutter-package-checks
        with:
          working_directory: example
          run_format: 'false'
          run_tests: 'false'

      - name: Catalog app analysis
        uses: ./.github/actions/flutter-package-checks
        with:
          working_directory: tool/catalog_app
          run_format: 'false'
          run_tests: 'false'

      - name: Build API docs
        if: matrix.os == 'ubuntu-latest'
        run: dart doc

      - name: Dependency outdated check (informational)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: dart pub outdated --mode=null-safety

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          install_catalog: 'true'

      - name: Run package tests
        uses: ./.github/actions/flutter-package-checks
        with:
          run_format: 'false'
          test_report_path: build/ci/test-report.json

      - name: Run example tests (if present)
        shell: bash
        run: |
          set -euo pipefail
          if find example/test -type f -name "*_test.dart" | grep -q .; then
            (cd example && flutter test --test-randomize-ordering-seed random)
          else
            echo "No example tests found; skipping."
          fi

      - name: Run catalog app tests
        working-directory: tool/catalog_app
        run: flutter test --test-randomize-ordering-seed random

      - name: Coverage report
        uses: ./.github/actions/coverage-report
        with:
          test_report_path: build/ci/test-report.json

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          install_example: 'false'

      - name: Build API docs for publish gate
        run: dart doc

      - name: Verify pub score
        uses: ./.github/actions/pana-score

      - name: Validate package publishing metadata
        run: flutter pub publish --dry-run
