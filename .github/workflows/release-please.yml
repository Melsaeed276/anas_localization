name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Create/update release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          release-type: dart
          package-name: anas_localization
          target-branch: main
          changelog-path: CHANGELOG.md

