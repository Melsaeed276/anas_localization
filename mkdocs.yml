      - Setup and Serve: catalog/setup-and-serve.md
      - Edit and Review Flow: catalog/edit-and-review-flow.md
      - Bulk Operations and API: catalog/bulk-and-api.md
      - Architecture: catalog/architecture.md
  - CLI:
      - Overview: cli/index.md
      - Common Workflows: cli/common-workflows.md
      - Validate: cli/validate.md
      - Import and Export: cli/import-export.md
      - Catalog Commands: cli/catalog.md
  - Reference:
      - Overview: reference/index.md
      - Features: reference/features.md
      - Config Reference: reference/config-reference.md
