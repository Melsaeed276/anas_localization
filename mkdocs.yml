site_name: anas_localization Docs
site_description: Task-first documentation for setup, usage, migration, testing, catalog workflows, and CLI reference.
site_url: https://melsaeed276.github.io/anas_localization/
repo_url: https://github.com/Melsaeed276/anas_localization
repo_name: Melsaeed276/anas_localization
docs_dir: doc
edit_uri: edit/main/doc/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: amber
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid.js

nav:
  - Home: index.md
  - Cookbook:
      - Overview: cookbook/index.md
      - Flutter App Setup: cookbook/flutter-app-setup.md
      - Runtime Locale Switching: cookbook/runtime-locale-switching.md
      - Testing Localized Widgets: cookbook/testing-localized-widgets.md
      - Migration Validation Flow: cookbook/migration-validation.md
      - Migrate from easy_localization: cookbook/migrate-from-easy-localization.md
      - Migrate from gen_l10n: cookbook/migrate-from-gen-l10n.md
  - Get Started:
      - Overview: get-started/index.md
      - Setup and Guidelines: get-started/setup-and-guidelines.md
      - Install and First Run: get-started/install-and-first-run.md
      - Add Translations and Assets: get-started/translations-and-assets.md
      - Generate and Wrap Your App: get-started/generate-and-wrap.md
  - Use in App:
      - Overview: use-in-app/index.md
      - Read Translations: use-in-app/read-translations.md
      - Switch Locale at Runtime: use-in-app/locale-switching.md
      - Preview Dictionaries and Loaders: use-in-app/preview-and-loaders.md
  - Migrate:
      - Overview: migrate/index.md
      - Migration Strategy: migrate/migration-strategy.md
      - From easy_localization: migrate/from-easy-localization.md
