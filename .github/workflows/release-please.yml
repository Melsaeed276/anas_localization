name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Create/update release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      - name: Checkout repository
        if: ${{ steps.release-please.outputs.pr != '' }}
        uses: actions/checkout@v7

      - name: Inject publish opt-in checkbox into release PR
        if: ${{ steps.release-please.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_PAYLOAD: ${{ steps.release-please.outputs.pr }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER="$(printf '%s' "${PR_PAYLOAD}" | jq -r '.number')"
          echo "Release PR number: ${PR_NUMBER}"

          MARKER="<!-- publish-opt-in -->"
          CHECKBOX="- [ ] Publish to pub.dev"

          BODY="$(gh pr view "${PR_NUMBER}" --json body --jq '.body')"

          # Strip any previous injected block, then re-add it.
          CLEANED="$(printf '%s\n' "${BODY}" | sed "/${MARKER}/,/<!-- \/publish-opt-in -->/d")"

          NEW_BODY="${CLEANED}

          ${MARKER}
          ${CHECKBOX}
          <!-- /publish-opt-in -->"

          gh pr edit "${PR_NUMBER}" --body "${NEW_BODY}"
