name: Release Tag Gate

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  release-gate:
    name: Release validation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    outputs:
      authorized: ${{ steps.authorize.outputs.authorized }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify tag was created by a main-branch release PR
        id: authorize
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_SHA="$(git rev-parse "refs/tags/${TAG}^{commit}")"
          echo "Tag ${TAG} points to commit ${TAG_SHA}"

          # Manual opt-in: a tag whose version matches pubspec is authorized
          # to publish. Creating and pushing the matching tag is the opt-in.
          PUB_VERSION="$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')"
          if [[ "${TAG}" == "${PUB_VERSION}" ]]; then
            echo "Tag v${TAG} matches pubspec version ${PUB_VERSION}; authorized to publish."
            echo "authorized=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # The tagged commit must be reachable from the main branch tip.
          if ! git merge-base --is-ancestor "${TAG_SHA}" "origin/main" 2>/dev/null; then
            echo "Tagged commit is NOT on the main branch. Refusing to publish."
            echo "authorized=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # The tagged commit must be a merge commit (PR merge into main).
          PARENT_COUNT="$(git rev-list --count --merges "${TAG_SHA}~1..${TAG_SHA}" 2>/dev/null || echo 0)"
          if [[ "${PARENT_COUNT}" -lt 1 ]]; then
            echo "Tagged commit is not a merge of a PR. Refusing to publish."
            echo "authorized=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Find the merged PR whose merge commit equals the tagged commit.
          PR_NUMBER="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${TAG_SHA}/pulls" \
            --jq '[.[] | select(.merged_at != null)] | .[0].number' 2>/dev/null || echo "")"
          if [[ -z "${PR_NUMBER}" || "${PR_NUMBER}" == "null" ]]; then
            echo "No merged PR found for the tagged commit ${TAG_SHA}. Refusing to publish."
            echo "authorized=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          PR_TITLE="$(gh pr view "${PR_NUMBER}" --json title --jq '.title' 2>/dev/null || echo "")"
          if [[ "${PR_TITLE}" != release-please* ]] && [[ "${PR_TITLE}" != chore\(main\): release* ]] && [[ "${PR_TITLE}" != "chore(main): release"* ]]; then
            echo "Merged PR is not a Release Please release PR (got: '${PR_TITLE}'). Refusing to publish."
            echo "authorized=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # The "Publish to pub.dev" opt-in checkbox must be checked in the PR body.
          PR_BODY="$(gh pr view "${PR_NUMBER}" --json body --jq '.body' 2>/dev/null || echo "")"
          if ! printf '%s\n' "${PR_BODY}" | grep -qE '\[x\] *Publish to pub\.dev'; then
            echo "Publish opt-in checkbox is NOT checked in release PR #${PR_NUMBER}. Refusing to publish to pub.dev."
            echo "authorized=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Tag ${TAG} authorized for publishing via Release Please release PR (#${PR_NUMBER})."
          echo "authorized=true" >> "${GITHUB_OUTPUT}"

      - name: Verify tag matches pubspec version
        if: steps.authorize.outputs.authorized == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not read version from pubspec.yaml"
            exit 1
          fi
          if [[ "${TAG}" != "${VERSION}" ]]; then
            echo "Tag v${TAG} does not match pubspec version ${VERSION}"
            exit 1
          fi
          echo "Tag v${TAG} matches pubspec version ${VERSION}"

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Package hygiene
        uses: ./.github/actions/package-hygiene

      - name: Validate version and changelog hygiene
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')"
          if [[ -z "$VERSION" ]]; then
            echo "Could not read version from pubspec.yaml"
            exit 1
          fi

          if ! grep -qE "^## \[?${VERSION}\]?" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a section header for version ${VERSION}"
            exit 1
          fi

          if grep -n "TODO" CHANGELOG.md; then
            echo "CHANGELOG.md contains TODO placeholders."
            exit 1
          fi

      - name: Build API docs
        run: dart doc

      - name: Verify pub score
        uses: ./.github/actions/pana-score

      - name: Dependency outdated check (informational)
        continue-on-error: true
        run: dart pub outdated || true

      - name: Generator smoke checks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/ci
          OUTPUT_DART=build/ci/dictionary.dart dart run anas_localization:localization_gen --modules --module-depth=2
          test -f build/ci/dictionary.dart
          grep -q "class Dictionary" build/ci/dictionary.dart
          dart run anas_localization:anas_cli validate assets/lang --profile=balanced

      - name: Publish dry-run
        run: flutter pub publish --dry-run

  github-release:
    name: GitHub Release
    needs: release-gate
    if: needs.release-gate.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          install_example: 'false'

      - name: Build CLI release artifacts (linux-x64)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release
          dart compile exe bin/localization_gen.dart -o build/release/localization_gen-linux-x64
          dart compile exe bin/anas_cli.dart -o build/release/anas_cli-linux-x64
          dart compile exe bin/cli.dart -o build/release/cli-linux-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: build/release/*

  publish:
    name: Publish to pub.dev
    needs: release-gate
    if: needs.release-gate.outputs.authorized == 'true'
    permissions:
      id-token: write
      contents: read
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
