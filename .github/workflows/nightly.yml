name: Nightly Full Suite

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nightly:
    name: Lint, tests, docs, benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Package hygiene
        uses: ./.github/actions/package-hygiene

      - name: Package checks
        uses: ./.github/actions/flutter-package-checks
        with:
          test_report_path: build/ci/test-report.json

      - name: Example analysis and tests
        uses: ./.github/actions/flutter-package-checks
        with:
          working_directory: example
          run_format: 'false'

      - name: Build API docs
        run: dart doc

      - name: Coverage report
        uses: ./.github/actions/coverage-report
        with:
          test_report_path: build/ci/test-report.json

      - name: Verify pub score
        uses: ./.github/actions/pana-score

      - name: Run benchmark harness
        run: flutter pub run benchmark/localization_benchmark.dart --output benchmark/latest_report.json

      - name: Compare against baseline
        shell: bash
        run: |
          set -euo pipefail
          BASELINE_OS="$(python3 -c "import json; print(json.load(open('benchmark/baseline.json'))['os'])")"
          if [[ "${BASELINE_OS}" != "linux" ]]; then
            echo "Skipping baseline comparison because benchmark/baseline.json targets ${BASELINE_OS}, not linux."
            exit 0
          fi
          flutter pub run benchmark/localization_benchmark.dart --compare benchmark/baseline.json --max-regression=0.25

      - name: Upload benchmark report artifact
        uses: actions/upload-artifact@v7
        with:
          name: localization-benchmark-report
          path: benchmark/latest_report.json
