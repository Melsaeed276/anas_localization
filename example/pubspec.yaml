name: localization_example
description: A demo app for the anas_localization package
publish_to: "none"

environment:
  sdk: ">=3.8.1 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  anas_localization:
    path: ..
    # Keep example using the local package during development.
    # Do not pin a version here; the root package version is authoritative.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true

  assets:
    - assets/lang/
