name: Release Tag Gate

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    name: Release validation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Verify tag matches pubspec version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not read version from pubspec.yaml"
            exit 1
          fi
          if [[ "${TAG}" != "${VERSION}" ]]; then
            echo "Tag v${TAG} does not match pubspec version ${VERSION}"
            exit 1
          fi
          echo "Tag v${TAG} matches pubspec version ${VERSION}"

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Package hygiene
        uses: ./.github/actions/package-hygiene

      - name: Validate version and changelog hygiene
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')"
          if [[ -z "$VERSION" ]]; then
            echo "Could not read version from pubspec.yaml"
            exit 1
          fi

          if ! grep -q "^## ${VERSION}$" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a section header for version ${VERSION}"
            exit 1
          fi

          if grep -n "TODO" CHANGELOG.md; then
            echo "CHANGELOG.md contains TODO placeholders."
            exit 1
          fi

      - name: Build API docs
        run: dart doc

      - name: Verify pub score
        uses: ./.github/actions/pana-score

      - name: Dependency outdated check (informational)
        continue-on-error: true
        run: dart pub outdated || true

      - name: Generator smoke checks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/ci
          OUTPUT_DART=build/ci/dictionary.dart dart run anas_localization:localization_gen --modules --module-depth=2
          test -f build/ci/dictionary.dart
          grep -q "class Dictionary" build/ci/dictionary.dart
          dart run anas_localization:anas_cli validate assets/lang --profile=balanced

      - name: Publish dry-run
        run: flutter pub publish --dry-run

  publish:
    name: Publish to pub.dev
    needs: release-gate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1

  github-release:
    name: GitHub Release
    needs: release-gate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          install_example: 'false'

      - name: Build CLI release artifacts (linux-x64)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release
          dart compile exe bin/localization_gen.dart -o build/release/localization_gen-linux-x64
          dart compile exe bin/anas_cli.dart -o build/release/anas_cli-linux-x64
          dart compile exe bin/cli.dart -o build/release/cli-linux-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: build/release/*
