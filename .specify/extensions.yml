# Extension hooks for speckit commands (e.g. speckit.implement).
# Only hooks with enabled: true are considered. Optional hooks are reported
# for the user to run manually; mandatory hooks are executed by the agent.
#
# Keys per hook: extension, command, description, prompt, enabled, optional,
# and optionally condition (if set, evaluation is left to HookExecutor).

hooks:
  before_tasks:
    - extension: speckit-doc-check
      command: speckit.checklist
      description: Ensure feature checklists are complete before generating tasks
      prompt: Run the checklist command for this feature so requirement and doc-requirements items are verified before task generation.
      enabled: true
      optional: true

  after_tasks:
    - extension: speckit-validate-links
      command: speckit.analyze
      description: Re-run analysis after task generation to confirm alignment with spec
      prompt: Run the analyze command for this feature to validate links and alignment with the spec after tasks.md is generated.
      enabled: true
      optional: true

  before_implement:
    - extension: speckit-doc-check
      command: speckit.checklist
      description: Ensure feature checklists are complete before implementing
      prompt: Run the checklist command for this feature so all requirement and doc-requirements items are verified before implementation.
      enabled: true
      optional: true

  after_implement:
    - extension: speckit-validate-links
      command: speckit.analyze
      description: Re-run analysis after implementation to confirm no new issues
      prompt: Run the analyze command for this feature to validate links and alignment with the spec after implementation.
      enabled: true
      optional: true
